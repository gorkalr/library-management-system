{% extends "base.html" %}
{% block content %}

<h3>Issue Book</h3>

<form method="POST">
    <select name="book_id" class="form-control mb-2">
        {% for book in books %}
        <option value="{{ book.id }}">{{ book.name }}</option>
        {% endfor %}
    </select>

    <button class="btn btn-success">Issue</button>
</form>

{% if success %}<p class="text-success">{{ success }}</p>{% endif %}

{% endblock %}
