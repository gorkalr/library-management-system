{% extends "base.html" %}
{% block content %}

<h3>Add Membership</h3>

<form method="POST">

Name:<br>
<input type="text" name="name" required><br><br>

Contact:<br>
<input type="text" name="contact" required><br><br>

Address:<br>

{% endblock %}
