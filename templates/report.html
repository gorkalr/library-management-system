{% extends "base.html" %}
{% block content %}

<h3>Library Report</h3>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
        labels: ['Total Books', 'Issued Books'],
        datasets: [{
            label: 'Stats',
            data: [{{ total_books }}, {{ issued_books }}]
        }]
    }
});
</script>

{% endblock %}
